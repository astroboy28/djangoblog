{% extends "blog/base.html" %}

{% block title %}{{ post.title }}{% endblock %}

{% block content %}
    {% if post.cover_image %}
        <img src="{{ post.cover_image.url }}" class="img-fluid mb-3" alt="{{ post.title }}">
    {% endif %}
<h1>{{ post.title }}</h1>
<p class="text-muted"> {{ post.created_at|date:"M d, Y" }}</p>
<p>{{ post.content }}</p>
<a href="{% url 'post_edit' post.slug %}" class="btn btn-sm btn-outline-secondary">Edit</a>
<a href="{% url 'post_delete' post.slug %}" class="btn btn-sm btn-outline-danger">Delete</a>
{% endblock %}
